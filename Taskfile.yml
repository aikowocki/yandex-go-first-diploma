version: '3'

dotenv: ['.env']

tasks:
  up:
      desc: "Поднять всё (postgres + dragonfly + gophermart + accrual)"
      cmds:
        - docker compose -f deploy/docker-compose.yml up -d --build
  down:
    desc: "Остановить всё"
    cmds:
      - docker compose -f deploy/docker-compose.yml down
  db-logs:
    desc: "Показать логи PostgreSQL"
    cmds:
      - docker compose -f deploy/docker-compose.yml logs -f postgres

  db-psql:
    desc: "Подключиться к PostgreSQL через psql"
    cmds:
      - source deploy/.env && docker compose -f deploy/docker-compose.yml exec -e PGUSER=$POSTGRES_USER -e PGDATABASE=$POSTGRES_DB postgres psql

  db-status:
    desc: "Проверить статус PostgreSQL контейнера"
    cmds:
      - docker compose -f deploy/docker-compose.yml ps postgres